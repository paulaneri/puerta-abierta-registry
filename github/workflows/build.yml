name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Commit dist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/ -f
          git diff --staged --quiet || git commit -m "Auto-build dist"
          git push
- name: Deploy on cPanel
        run: |
          curl -s \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_TOKEN }}" \
            -H "Accept: application/json" \
            "https://${{ secrets.CPANEL_DOMAIN }}:2083/json-api/cpanel?cpanel_jsonapi_module=VersionControl&cpanel_jsonapi_func=deploy&repository_root=${{ secrets.CPANEL_REPO_PATH }}"
